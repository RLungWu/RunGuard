name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    name: Python checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Run Ruff
        run: ruff check .

      - name: Run mypy
        run: mypy src